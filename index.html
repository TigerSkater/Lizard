<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lizard Button</title>
<style>
  body {
    background-color: #f0fdf4;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' height='40' width='40'><text y='30' font-size='30'>🦎</text></svg>") 16 16, auto;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'><text x='0' y='40' font-size='40' fill='black' opacity='0.08'>🦎</text></svg>");
    background-size: 60px 60px;
    background-repeat: repeat;
  }

  #lizardButton {
    background-color: #a7f3d0;
    border: none;
    border-radius: 50%;
    width: 160px;
    height: 160px;
    font-size: 70px;
    cursor: pointer;
    box-shadow: 0 6px #059669;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    z-index: 3;
  }

  #lizardButton:active,
  #lizardButton.zoomed {
    transform: scale(1.1) translateY(4px);
    box-shadow: 0 3px #059669;
  }

  .addButtons {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    z-index: 3;
    flex-wrap: wrap;
    justify-content: center;
  }

  .addButtons button {
    background-color: #6ee7b7;
    border: none;
    padding: 10px 16px;
    font-size: 20px;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px #059669;
  }

  #counter {
    font-size: 28px;
    margin-top: 20px;
    color: #065f46;
    user-select: none;
    height: 40px;
    z-index: 3;
  }

  .floatText {
    position: absolute;
    color: #065f46;
    font-weight: bold;
    font-size: 24px;
    animation: floatUp 1s ease-out forwards;
    pointer-events: none;
    z-index: 4;
  }

  @keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-40px); opacity: 0; }
  }

  .dvdLizard {
    position: absolute;
    font-size: 40px;
    cursor: pointer;
    user-select: none;
    z-index: 1;
  }

  .turtle {
    position: absolute;
    font-size: 60px;
    z-index: 2;
    pointer-events: none;
    transition: transform 0.3s;
  }

  /* bottom-left controls */
  #bottomLeftControls {
    position: fixed;
    left: 14px;
    bottom: 14px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
  }

  #modeToggleBtn, #resetLizardsBtn {
    background-color: #6ee7b7;
    border: none;
    padding: 10px 14px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px #059669;
  }

  #resetLizardsBtn[hidden] {
    display: none;
  }
</style>
</head>
<body>

<button id="lizardButton" aria-label="Lizard button">🦎</button>

<div class="addButtons">
  <button id="add10">+10</button>
  <button id="autoClick">Auto: OFF</button>
</div>

<div id="counter" aria-live="polite">Pressed: 0</div>

<!-- bottom-left -->
<div id="bottomLeftControls">
  <button id="modeToggleBtn">Mode: Predator 🐢</button>
  <button id="resetLizardsBtn" hidden>Reset Lizards (10)</button>
</div>

<script>
  const button = document.getElementById('lizardButton');
  const counterDisplay = document.getElementById('counter');
  const add10Btn = document.getElementById('add10');
  const autoClickBtn = document.getElementById('autoClick');

  const modeToggleBtn = document.getElementById('modeToggleBtn');
  const resetLizardsBtn = document.getElementById('resetLizardsBtn');

  let count = 0;
  let autoClickInterval = null;
  let autoSpeedIndex = 0;
  const autoSpeeds = [0, 2, 5, 10, 20];

  const lizards = [];

  // MODES:
  // "predator" = turtle spawns and kills half
  // "growth"   = no turtle; +6 or +7 lizards per second; reset button
  let mode = "predator";

  let turtleInterval = null;
  let growthInterval = null;

  // Audio pool
  const soundPoolSize = 10;
  const sounds = [];
  for (let i = 0; i < soundPoolSize; i++) {
    const audio = new Audio("audio/Lizard.mp3");
    audio.preload = "auto";
    sounds.push(audio);
  }
  let soundIndex = 0;

  function playSound(times = 1) {
    for (let i = 0; i < times; i++) {
      setTimeout(() => {
        const sound = sounds[soundIndex];
        sound.currentTime = 0;
        sound.play().catch(err => console.warn(err));
        soundIndex = (soundIndex + 1) % soundPoolSize;
      }, i * 200);
    }
  }

  function updateCounter(amount) {
    count += amount;
    counterDisplay.textContent = `Pressed: ${count}`;
    showFloatingText(`+${amount}`);
  }

  function showFloatingText(text) {
    const span = document.createElement('span');
    span.className = 'floatText';
    span.textContent = text;
    const rect = button.getBoundingClientRect();
    span.style.left = (rect.left + rect.width / 2) + 'px';
    span.style.top = (rect.top - 10) + 'px';
    document.body.appendChild(span);
    setTimeout(() => span.remove(), 1000);
  }

  function pressAnimation() {
    button.classList.add('zoomed');
    setTimeout(() => button.classList.remove('zoomed'), 80);
  }

  // --- main press logic ---
  function handlePress() {
    updateCounter(1);
    playSound(1);
  }

  button.addEventListener('click', handlePress);

  // Space bar activates lizard button
  document.addEventListener('keydown', (e) => {
    const isSpace = (e.code === 'Space' || e.key === ' ');
    if (isSpace) {
      e.preventDefault();
      if (e.repeat) return;
      button.click();
      pressAnimation();
    }
  });

  add10Btn.addEventListener('click', () => {
    updateCounter(10);
    playSound(10);
  });

  autoClickBtn.addEventListener('click', () => {
    autoSpeedIndex = (autoSpeedIndex + 1) % autoSpeeds.length;
    const cps = autoSpeeds[autoSpeedIndex];
    autoClickBtn.textContent = cps > 0 ? `Auto: ${cps}/sec` : 'Auto: OFF';

    if (autoClickInterval) clearInterval(autoClickInterval);
    if (cps > 0) {
      autoClickInterval = setInterval(() => {
        button.click();
        pressAnimation();
      }, 1000 / cps);
    }
  });

  // --- DVD Bouncing Lizards ---
  function createDvdLizard() {
    const liz = document.createElement('div');
    liz.className = 'dvdLizard';
    liz.textContent = '🦎';
    document.body.appendChild(liz);
    lizards.push(liz);

    let x = Math.random() * (window.innerWidth - 40);
    let y = Math.random() * (window.innerHeight - 40);
    let dx = (Math.random() < 0.5 ? 1 : -1) * (2 + Math.random() * 2);
    let dy = (Math.random() < 0.5 ? 1 : -1) * (2 + Math.random() * 2);

    liz.addEventListener('click', () => {
      playSound(1);
      updateCounter(1);
    });

    function move() {
      if (!document.body.contains(liz)) return;
      x += dx;
      y += dy;

      if (x <= 0 || x >= window.innerWidth - 40) dx *= -1;
      if (y <= 0 || y >= window.innerHeight - 40) dy *= -1;

      liz.style.left = x + 'px';
      liz.style.top = y + 'px';

      requestAnimationFrame(move);
    }
    move();
  }

  function spawnLizards(n) {
    for (let i = 0; i < n; i++) createDvdLizard();
  }

  function setLizardCount(target) {
    // remove extras
    while (lizards.length > target) {
      const liz = lizards.pop();
      if (liz) liz.remove();
    }
    // add missing
    while (lizards.length < target) {
      createDvdLizard();
    }
  }

  // Spawn initial lizards
  spawnLizards(10);

  // Respawn lizards slowly over time (only makes sense in predator mode)
  let respawnInterval = setInterval(() => {
    if (mode !== "predator") return;
    if (lizards.length < 20) createDvdLizard();
  }, 2000);

  // --- Turtle predator ---
  function spawnTurtle() {
    const turtle = document.createElement('div');
    turtle.className = 'turtle';
    turtle.textContent = '🐢';
    document.body.appendChild(turtle);

    let startX = -100;
    let startY = Math.random() * (window.innerHeight - 60);
    turtle.style.left = startX + 'px';
    turtle.style.top = startY + 'px';

    let speed = 6 + Math.random() * 4;
    function move() {
      startX += speed;
      turtle.style.left = startX + 'px';
      if (startX > window.innerWidth + 100) {
        turtle.remove();
      } else {
        requestAnimationFrame(move);
      }
    }
    move();

    // Kill half the lizards
    const killCount = Math.floor(lizards.length / 2);
    for (let i = 0; i < killCount; i++) {
      const idx = Math.floor(Math.random() * lizards.length);
      const liz = lizards.splice(idx, 1)[0];
      if (liz) liz.remove();
    }
  }

  function startPredatorMode() {
    stopGrowthMode();
    resetLizardsBtn.hidden = true;
    modeToggleBtn.textContent = "Mode: Predator 🐢";

    // turtle every 10s, 50% chance (same vibe as your original)
    if (turtleInterval) clearInterval(turtleInterval);
    turtleInterval = setInterval(() => {
      if (mode !== "predator") return;
      if (Math.random() < 0.5) spawnTurtle();
    }, 10000);
  }

  function stopPredatorMode() {
    if (turtleInterval) {
      clearInterval(turtleInterval);
      turtleInterval = null;
    }
  }

  function startGrowthMode() {
    stopPredatorMode();
    resetLizardsBtn.hidden = false;
    modeToggleBtn.textContent = "Mode: Growth 📈";

    // stop turtle + keep lizards growing +6 or +7 every second
    if (growthInterval) clearInterval(growthInterval);
    growthInterval = setInterval(() => {
      if (mode !== "growth") return;
      const add = (Math.random() < 0.5 ? 6 : 7);
      spawnLizards(add);
    }, 1000);
  }

  function stopGrowthMode() {
    if (growthInterval) {
      clearInterval(growthInterval);
      growthInterval = null;
    }
  }

  // mode switch button (bottom-left)
  modeToggleBtn.addEventListener('click', () => {
    mode = (mode === "predator") ? "growth" : "predator";
    if (mode === "predator") startPredatorMode();
    else startGrowthMode();
  });

  // reset button (only in growth mode)
  resetLizardsBtn.addEventListener('click', () => {
    setLizardCount(10);
  });

  // initialize predator mode
  startPredatorMode();

  // keep lizards in bounds on resize (optional nice-to-have)
  window.addEventListener('resize', () => {
    // nothing required; movement checks window.innerWidth/Height each frame
  });
</script>

</body>
</html>
